<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="PrepTrack - Your AI-powered placement preparation tracker. Track DSA, numerical ability, and more with analytics, weak topic detection, and study streaks." />
  <title>PrepTrack – AI-Powered Placement Tracker</title>
  <!-- Apply theme BEFORE React renders to prevent flash -->
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('preptrack-theme');
        if (theme === 'dark' || theme === null) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) { }
    })();
  </script>
</head>

<body class="bg-white dark:bg-gray-950 min-h-screen">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
